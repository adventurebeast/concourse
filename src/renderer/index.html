<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; worker-src 'self' blob:; script-src 'self'"
    />
    <title>Concourse</title>
  </head>
  <body>
    <div id="app">
      <!-- Full-width top title bar -->
      <header id="titlebar">
        <div class="titlebar-left">
          <span class="titlebar-logo" data-icon="box" data-size="16"></span>
        </div>
        <div class="titlebar-center" id="titlebar-title">Concourse</div>
        <div class="titlebar-right">
          <button id="toggle-sidebar" class="title-btn active" data-icon="panelLeft" title="Toggle Sidebar"></button>
          <button id="toggle-panel" class="title-btn active" data-icon="panelBottom" title="Toggle Terminal Panel"></button>
          <button id="toggle-terminals" class="title-btn" data-icon="terminal" title="Terminals Only (hide editor)"></button>
          <button id="toggle-mode" class="title-btn" data-icon="lifeBuoy" title="Switch to Expert Mode"></button>
          <button id="toggle-theme" class="title-btn" data-icon="moon" title="Toggle Light / Dark Theme"></button>
        </div>
      </header>

      <!-- Body row: activity bar + sidebar + main -->
      <div id="body">
        <nav id="activity-bar">
          <button class="activity-btn active" data-view="explorer" data-icon="files" data-size="24" title="Explorer"></button>
          <button class="activity-btn" data-view="scm" data-icon="gitBranch" data-size="24" title="Source Control"></button>
        </nav>

        <aside id="sidebar">
          <section id="explorer-panel" class="view-panel">
            <div class="pane-header">
              <span class="pane-title">EXPLORER</span>
              <div class="pane-actions">
                <button id="ft-new-file" class="icon-btn" data-icon="filePlus" title="New File"></button>
                <button id="ft-new-folder" class="icon-btn" data-icon="folderPlus" title="New Folder"></button>
                <button id="ft-refresh" class="icon-btn" data-icon="refresh" title="Refresh"></button>
                <button id="ft-collapse" class="icon-btn" data-icon="collapse" title="Collapse All"></button>
                <button id="open-folder" class="icon-btn" data-icon="folderOpen" title="Open Folder…"></button>
              </div>
            </div>
            <div id="workspace-name" class="workspace-root" hidden></div>
            <div id="file-tree" class="panel-body"></div>
          </section>

          <section id="scm-panel" class="view-panel" hidden>
            <div class="pane-header">
              <span class="pane-title">SOURCE CONTROL</span>
              <div class="pane-actions">
                <button id="scm-commit" class="icon-btn" data-icon="check" title="Commit"></button>
                <button id="scm-refresh" class="icon-btn" data-icon="refresh" title="Refresh"></button>
              </div>
            </div>
            <div id="scm-body" class="panel-body"></div>
          </section>
        </aside>

        <div id="drag-x" class="dragbar-v"></div>

        <main id="main">
          <section id="editor-region">
            <div id="editor-tabs" class="tab-bar"></div>
            <div id="editor-stack">
              <div id="editor"></div>
              <div id="editor-welcome">
                <svg viewBox="0 0 24 24" width="120" height="120" fill="none" stroke="currentColor" stroke-width="0.6">
                  <path d="M12 2 3 7v10l9 5 9-5V7z"/>
                  <path d="M3 7l9 5 9-5M12 12v10"/>
                </svg>
                <div class="welcome-title">Concourse</div>
                <div class="welcome-sub">Open a folder, then drive your agents from the terminal.</div>
              </div>
            </div>
          </section>

          <div id="drag-y" class="dragbar-h"></div>

          <section id="terminal-region">
            <div class="panel-tabbar">
              <div class="panel-label">TERMINAL</div>
              <div id="term-tabs" class="term-tabs"></div>
              <div class="panel-controls"></div>
            </div>
            <div id="term-panes"></div>
          </section>
        </main>
      </div>

      <!-- Full-width bottom status bar -->
      <footer id="status-bar">
        <div class="status-left">
          <span id="status-branch" class="status-item" title="Git branch"></span>
          <span id="status-workspace" class="status-item"></span>
        </div>
        <div class="status-right">
          <span id="status-info" class="status-item">Concourse</span>
        </div>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
