<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; worker-src 'self' blob:; script-src 'self'"
    />
    <title>Concourse</title>
  </head>
  <body>
    <div id="app">
      <!-- Full-width top title bar -->
      <header id="titlebar">
        <div class="titlebar-left">
        </div>
        <div class="titlebar-center" id="titlebar-title">Concourse</div>
        <div class="titlebar-right">
          <button id="toggle-sidebar" class="title-btn active" data-icon="panelLeft" title="Toggle Sidebar"></button>
          <button id="toggle-panel" class="title-btn active" data-icon="panelBottom" title="Toggle Terminal Panel"></button>
          <button id="toggle-terminals" class="title-btn" data-icon="terminal" title="Terminals Only (hide editor)"></button>
          <button id="toggle-mode" class="mode-toggle" title="Switch to Expert Mode"></button>
          <button id="toggle-theme" class="title-btn" data-icon="moon" title="Toggle Light / Dark Theme"></button>
        </div>
      </header>

      <!-- Body row: activity bar + sidebar + main -->
      <div id="body">
        <nav id="activity-bar">
          <button class="activity-btn active" data-view="explorer" data-icon="files" data-size="24" title="Explorer"></button>
          <button class="activity-btn" data-view="search" data-icon="search" data-size="24" title="Search"></button>
          <button class="activity-btn" data-view="scm" data-icon="gitBranch" data-size="24" title="Source Control"></button>
        </nav>

        <aside id="sidebar">
          <section id="explorer-panel" class="view-panel">
            <div class="pane-header">
              <span class="pane-title">EXPLORER</span>
              <div class="pane-actions">
                <button id="ft-new-file" class="icon-btn" data-icon="filePlus" title="New File"></button>
                <button id="ft-new-folder" class="icon-btn" data-icon="folderPlus" title="New Folder"></button>
                <button id="ft-refresh" class="icon-btn" data-icon="refresh" title="Refresh"></button>
                <button id="ft-collapse" class="icon-btn" data-icon="collapse" title="Collapse All"></button>
                <button id="open-folder" class="icon-btn" data-icon="folderOpen" title="Open Folder…"></button>
              </div>
            </div>
            <div id="workspace-name" class="workspace-root" hidden></div>
            <div id="file-tree" class="panel-body"></div>
          </section>

          <section id="search-panel" class="view-panel" hidden>
            <div class="pane-header">
              <span class="pane-title">SEARCH</span>
              <div class="pane-actions">
                <button id="search-clear" class="icon-btn" data-icon="close" title="Clear Search"></button>
              </div>
            </div>
            <div class="search-controls">
              <div class="search-field">
                <textarea id="search-input" class="search-input" rows="1" placeholder="Search" spellcheck="false"></textarea>
                <div class="search-toggles">
                  <button id="search-case" class="search-toggle" title="Match Case">Aa</button>
                  <button id="search-word" class="search-toggle" title="Match Whole Word"><u>ab</u></button>
                  <button id="search-regex" class="search-toggle" title="Use Regular Expression">.*</button>
                </div>
              </div>
            </div>
            <div id="search-summary" class="search-summary" hidden></div>
            <div id="search-body" class="panel-body"></div>
          </section>

          <section id="scm-panel" class="view-panel" hidden>
            <div class="pane-header">
              <span class="pane-title">SOURCE CONTROL</span>
              <div class="pane-actions">
                <button id="scm-commit" class="icon-btn" data-icon="check" title="Commit"></button>
                <button id="scm-refresh" class="icon-btn" data-icon="refresh" title="Refresh"></button>
              </div>
            </div>
            <div id="scm-body" class="panel-body"></div>
          </section>
        </aside>

        <div id="drag-x" class="dragbar-v"></div>

        <main id="main">
          <section id="terminal-region">
            <div class="panel-tabbar">
              <div class="panel-label">TERMINAL</div>
              <div id="term-tabs" class="term-tabs"></div>
              <div class="panel-controls">
                <button id="cmd-trigger" title="Browse commands you can run">
                  <span data-icon="wand" data-size="14"></span><span>Commands</span>
                </button>
              </div>
            </div>
            <div id="beginner-context" class="beginner-context" hidden></div>
            <div id="term-panes"></div>
            <div id="cmd-strip" class="cmd-strip"></div>
          </section>

          <div id="drag-y" class="dragbar-h"></div>

          <section id="editor-region">
            <div id="editor-tabs" class="tab-bar">
              <button id="editor-minimize" class="icon-btn editor-minimize" data-icon="chevronDown" title="Minimize (hide the editor, keep tabs)"></button>
            </div>
            <div id="editor-stack">
              <div id="editor"></div>
              <div id="editor-welcome">
                <svg viewBox="0 0 24 24" width="120" height="120" fill="none" stroke="currentColor" stroke-width="0.6">
                  <path d="M12 2 3 7v10l9 5 9-5V7z"/>
                  <path d="M3 7l9 5 9-5M12 12v10"/>
                </svg>
                <div class="welcome-title">Concourse</div>
                <div class="welcome-sub">Open a folder, then drive your agents from the terminal.</div>
              </div>
            </div>
          </section>
        </main>

        <!-- Launch / start screen: shown over the workbench when no folder is open -->
        <div id="welcome-overlay" hidden>
          <div class="welcome-card">
            <div class="welcome-brand">
              <span class="welcome-logo" data-icon="box" data-size="44"></span>
              <div class="welcome-heading">Concourse</div>
              <div class="welcome-tagline">Drive many CLI coding agents from one workbench.</div>
            </div>

            <div class="welcome-section">
              <div class="welcome-section-title">Start</div>
              <button id="welcome-open" class="welcome-action">
                <span class="welcome-action-icon" data-icon="folderOpen" data-size="16"></span>
                <span>Open Folder…</span>
              </button>
            </div>

            <div class="welcome-section">
              <div class="welcome-section-title">Recent</div>
              <div id="welcome-recents" class="welcome-recents"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Full-width bottom status bar -->
      <footer id="status-bar">
        <div class="status-left">
          <span id="status-branch" class="status-item" title="Git branch"></span>
          <span id="status-workspace" class="status-item"></span>
        </div>
        <div class="status-right">
          <span id="status-info" class="status-item">Concourse</span>
        </div>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
