<!doctype html><html><head><meta charset="utf-8"><style>
 body{margin:0;background:#23262e;display:flex;gap:48px;align-items:center;justify-content:center;height:100vh;
      font:13px -apple-system,system-ui,sans-serif;}
 .wrap{display:flex;flex-direction:column;align-items:center;} .cap{color:#cfd3da;margin-top:14px;}
</style></head><body>
<script>
const O={tl:[70,70],tr:[954,70],br:[954,954],bl:[70,954]};
const I={tl:[440,438],tr:[584,438],br:[584,524],bl:[440,524]};
const P=a=>a.join(',');
function art(id,pal){
 const g=(gid,x1,y1,x2,y2,c0,c1)=>`<linearGradient id="${gid}${id}" gradientUnits="userSpaceOnUse" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"><stop offset="0" stop-color="${c0}"/><stop offset="1" stop-color="${c1}"/></linearGradient>`;
 const dashes=[[884,46,40],[806,36,30],[742,28,23],[688,21,17],[644,15,12],[610,11,9]]
   .map(([y,w,h])=>`<rect x="${512-w/2}" y="${y}" width="${w}" height="${h}" fill="${pal.dash}"/>`).join('');
 const L=`stroke="${pal.line}" stroke-width="5" stroke-linejoin="round"`;
 return `
<svg viewBox="0 0 1024 1024" width="232" height="232" xmlns="http://www.w3.org/2000/svg">
 <defs>
   <clipPath id="sq${id}"><rect x="40" y="40" width="944" height="944" rx="212"/></clipPath>
   ${g('cei',512,70,512,438,pal.cei0,pal.cei1)}
   ${g('flo',512,954,512,524,pal.flo0,pal.flo1)}
   ${g('lft',70,512,440,512,pal.lft0,pal.lft1)}
   ${g('rgt',954,512,584,512,pal.rgt0,pal.rgt1)}
 </defs>
 <g clip-path="url(#sq${id})">
   <rect x="40" y="40" width="944" height="944" fill="${pal.tile}"/>
   <polygon points="${P(O.tl)} ${P(O.tr)} ${P(I.tr)} ${P(I.tl)}" fill="url(#cei${id})" ${L}/>
   <polygon points="${P(O.bl)} ${P(O.br)} ${P(I.br)} ${P(I.bl)}" fill="url(#flo${id})" ${L}/>
   <polygon points="${P(O.tl)} ${P(I.tl)} ${P(I.bl)} ${P(O.bl)}" fill="url(#lft${id})" ${L}/>
   <polygon points="${P(O.tr)} ${P(I.tr)} ${P(I.br)} ${P(O.br)}" fill="url(#rgt${id})" ${L}/>
   ${dashes}
   <rect x="${I.tl[0]}" y="${I.tl[1]}" width="${I.tr[0]-I.tl[0]}" height="${I.bl[1]-I.tl[1]}" fill="${pal.open}" ${L}/>
 </g>
</svg>`;}
// flatter facets (less gradient range) so the borders carry the isometric read
const DARK={tile:'#181818',cei0:'#c4c4c4',cei1:'#aeaeae',flo0:'#7a7a7a',flo1:'#8c8c8c',
  lft0:'#8e8e8e',lft1:'#9c9c9c',rgt0:'#5e5e5e',rgt1:'#6c6c6c',open:'#efefef',dash:'#f4f4f4',line:'#141414'};
const LIGHT={tile:'#181818',cei0:'#c4c4c4',cei1:'#aeaeae',flo0:'#7a7a7a',flo1:'#8c8c8c',
  lft0:'#8e8e8e',lft1:'#9c9c9c',rgt0:'#5e5e5e',rgt1:'#6c6c6c',open:'#efefef',dash:'#f4f4f4',line:'#e9e9e9'};
function tile(id,label,p){return `<div class="wrap">${art(id,p)}<div class="cap">${label}</div></div>`;}
document.write(tile('d','Dark borders',DARK)+tile('l','Light borders',LIGHT));
</script></body></html>
