appId: com.concourse.ide
productName: Concourse
# Where the packaged app + installer land
directories:
  output: release
  buildResources: build
# electron-vite already compiled everything into out/ — ship that + the manifest
files:
  - out/**/*
  - package.json
# node-pty is a native module: it must live outside the asar archive so the
# compiled .node binary can be dlopen'd at runtime. The search worker is unpacked
# too so worker_threads can load it as a plain file (no in-asar Worker quirks).
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "out/main/search-worker.js"
# Bundled local-model runtime: the llama.cpp `llama-server` binary + its sibling libs,
# vendored into build/bin by `npm run fetch:llama` (the dist/pack scripts run it first).
# Shipped to <Resources>/llama so a user with no Ollama still gets a built-in, offline
# Pulse model. The ~400 MB weights are NOT bundled — they download on first use.
extraResources:
  - from: build/bin
    to: llama
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  # Developer beta: no Apple signing/notarization. electron-builder ad-hoc-signs
  # the arm64 binary so it runs locally; downloaded copies still hit Gatekeeper,
  # so the README documents the one-time `xattr -dr com.apple.quarantine` step.
  identity: null
# Versioned, arch-tagged DMG name so each beta drop is distinguishable on the
# Releases page (e.g. Concourse-0.0.17-arm64.dmg).
artifactName: ${productName}-${version}-${arch}.${ext}
# Skip the implicit `npm rebuild` electron-builder runs; native deps were
# already rebuilt for this Electron by the postinstall electron-rebuild step.
npmRebuild: false
